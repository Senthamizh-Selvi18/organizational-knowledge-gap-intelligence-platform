spring.application.name=knowledge-gap-platform

spring.datasource.url=jdbc:postgresql://localhost:5432/knowledge_gap_platform
spring.datasource.username=postgres
spring.datasource.password=Vanka@220
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.profiles.active=local

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.password-reset.token-expiry-minutes=30
app.password-reset.frontend-url=${FRONTEND_RESET_URL:http://localhost:5173/reset-password}

app.cors.allowed-origin=${FRONTEND_RESET_URL_ORIGIN:http://localhost:5173}

jwt.secret=${JWT_SECRET}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

app.oauth2.default-role=EMPLOYEE
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}
app.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login?error=oauth2}

fast2sms.api.key=test123

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB