spring.application.name=knowledge-gap-platform

spring.datasource.url=jdbc:postgresql://localhost:5432/knowledge_gap_platform
spring.datasource.username=postgres
spring.datasource.password=knowledgegap@2026

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=mysecretkeymysecretkeymysecretkey123456

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

app.oauth2.default-role=EMPLOYEE
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}
app.oauth2.failure-redirect-uri=${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login?error=oauth2}